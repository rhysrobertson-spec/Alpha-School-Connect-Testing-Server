<!-- sha256 helper (standalone, no dependencies) -->
<script>
window.sha256 = async function(s) {
  const b = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(s));
  return [...new Uint8Array(b)].map(x => x.toString(16).padStart(2,"0")).join("");
};
</script>

<!-- Local storage mock — simulates Firebase Realtime Database API.
     Swap this block out for the real Firebase init when ready. -->
<script>
window._db = {
  ref: function(key) {
    return {
      get: async function() {
        const val = localStorage.getItem(key);
        return {
          exists: () => val !== null,
          val: () => val
        };
      },
      set: async function(value) {
        localStorage.setItem(key, String(value));
      },
      remove: async function() {
        localStorage.removeItem(key);
      }
    };
  }
};
</script>

<script type="text/babel" data-presets="react">

// ── helpers ───────────────────────────────────────────────────────────────────
const safe = s => s.replace(/[^a-zA-Z0-9]/g, "_");

// ── Firebase Realtime Database storage layer ──────────────────────────────────
// All data lives under /kv/{sanitized_key} as a plain string value.
// This works identically on every device / browser worldwide.
const db = window._db;

function dbKey(key) {
  // Realtime Database keys can't contain . # $ [ ]
  return "kv/" + key.replace(/[.#$[\]]/g, "_").substring(0, 200);
}

async function load(key) {
  const snap = await db.ref(dbKey(key)).get();
  return snap.exists() ? { value: snap.val() } : null;
}

async function save(key, value) {
  try {
    const ref = db.ref(dbKey(key));
    if (value === null) {
      await ref.remove();
    } else {
      const v = typeof value === "string" ? value : JSON.stringify(value);
      await ref.set(v);
    }
  } catch(e) {
    console.warn("save error", key, e);
  }
}

// ── message helpers ───────────────────────────────────────────────────────────
const msgKey  = r => "msgs_"+safe(r);
const partKey = r => "part_"+safe(r);
async function getMsgs(roomId){return(await load(msgKey(roomId)))?JSON.parse((await load(msgKey(roomId))).value):[];}
async function saveMsgs(roomId,arr){if(arr.length>150)arr=arr.slice(-150);await save(msgKey(roomId),JSON.stringify(arr));}
async function appendMsg(roomId,msg){
  const arr=await getMsgs(roomId);
  if(!arr.find(m=>m.id===msg.id)){arr.push(msg);await saveMsgs(roomId,arr);}
  const pkR=await load(partKey(roomId));const parts=pkR?JSON.parse(pkR.value):[];
  if(!parts.includes(msg.from)){parts.push(msg.from);await save(partKey(roomId),JSON.stringify(parts));}
}
async function updateMsg(roomId,msgId,patch){
  const arr=await getMsgs(roomId);const i=arr.findIndex(m=>m.id===msgId);
  if(i!==-1){arr[i]={...arr[i],...patch};await saveMsgs(roomId,arr);}
}
async function deleteMsg(roomId,msgId){await saveMsgs(roomId,(await getMsgs(roomId)).filter(m=>m.id!==msgId));}

// ── announcement helpers ──────────────────────────────────────────────────────
const annKey=loc=>"announce_"+safe(loc);
async function getAnnouncement(loc){const r=await load(annKey(loc));return r?JSON.parse(r.value):null;}
async function saveAnnouncement(loc,data){await save(annKey(loc),JSON.stringify(data));}
async function clearAnnouncement(loc){await save(annKey(loc),null);}

// ── call helpers ──────────────────────────────────────────────────────────────
const callsKey = loc => "calls_" + safe(loc);
async function loadCalls(loc) {
  const r = await load(callsKey(loc));
  return r ? JSON.parse(r.value) : [];
}
async function saveCalls(loc, arr) {
  await save(callsKey(loc), JSON.stringify(arr));
}
async function startCall(loc, callName, user) {
  const calls = await loadCalls(loc);
  const call = {
    id: "call_" + Date.now(),
    name: callName,
    hostEmail: user.email,
    participants: [{ email: user.email, name: user.name, avatar: user.avatar || null }],
    startedAt: Date.now()
  };
  calls.push(call);
  await saveCalls(loc, calls);
  return call;
}
async function joinCall(loc, callId, user) {
  const calls = await loadCalls(loc);
  const idx = calls.findIndex(c => c.id === callId);
  if (idx === -1) return null;
  if (!calls[idx].participants.find(p => p.email === user.email)) {
    calls[idx].participants.push({ email: user.email, name: user.name, avatar: user.avatar || null });
    await saveCalls(loc, calls);
  }
  return calls[idx];
}
async function leaveCall(loc, callId, userEmail) {
  const calls = await loadCalls(loc);
  const idx = calls.findIndex(c => c.id === callId);
  if (idx === -1) return;
  calls[idx].participants = calls[idx].participants.filter(p => p.email !== userEmail);
  if (calls[idx].participants.length === 0) {
    calls.splice(idx, 1);
  }
  await saveCalls(loc, calls);
}

async function writeNotif(toEmail,text){
  const key="notifs_"+safe(toEmail);
  const r=await load(key);const arr=r?JSON.parse(r.value):[];
  arr.unshift({id:Date.now()+"_"+Math.random().toString(36).slice(2,5),text,ts:Date.now(),read:false});
  if(arr.length>60)arr.splice(60);
  await save(key,JSON.stringify(arr));
}
async function loadNotifs(email){const r=await load("notifs_"+safe(email));return r?JSON.parse(r.value):[];}
async function markAllRead(email){
  const arr=await loadNotifs(email);
  if(arr.some(n=>!n.read))await save("notifs_"+safe(email),JSON.stringify(arr.map(n=>({...n,read:true}))));
}
async function getGuidesAtCampus(loc){
  const r=await load("all_emails");const emails=r?JSON.parse(r.value):[];
  const guides=[];
  for(const e of emails){const ur=await load("u_"+safe(e));if(ur){const ud=JSON.parse(ur.value);if(ud&&ud.location===loc&&ud.role==="guide")guides.push(ud);}}
  return guides;
}
async function getParentsOfStudent(studentEmail,loc){
  const r=await load("all_emails");const emails=r?JSON.parse(r.value):[];
  const parents=[];
  for(const e of emails){const ur=await load("u_"+safe(e));if(ur){const ud=JSON.parse(ur.value);if(ud&&ud.location===loc&&ud.role==="parent"&&(ud.children||[]).includes(studentEmail))parents.push(ud);}}
  return parents;
}

// ── kairos points helpers ─────────────────────────────────────────────────────
const KAIROS_DEFAULT=3;const KAIROS_MAX=10;const KAIROS_GAME_MIN=6;
function getMondayKey(){const d=new Date();const day=d.getDay();const diff=d.getDate()-(day===0?6:day-1);const mon=new Date(d.setDate(diff));return mon.toISOString().slice(0,10);}
async function getKairos(email){
  const r=await load("kairos_"+safe(email));
  if(!r)return{points:KAIROS_DEFAULT,weekKey:getMondayKey()};
  const data=JSON.parse(r.value);
  const thisWeek=getMondayKey();
  if(data.weekKey!==thisWeek){const reset={points:KAIROS_DEFAULT,weekKey:thisWeek};await save("kairos_"+safe(email),JSON.stringify(reset));return reset;}
  return data;
}
async function setKairos(email,points){const weekKey=getMondayKey();await save("kairos_"+safe(email),JSON.stringify({points:Math.min(KAIROS_MAX,Math.max(0,points)),weekKey}));}

function KairosPanel({user,allStudents,onClose,onAdjust}){
  const[pointsMap,setPointsMap]=useState({});
  const[loading,setLoading]=useState(true);
  const[adjusting,setAdjusting]=useState(null);
  const isGuide=user.role==="guide";
  const isParent=user.role==="parent";
  const isStudent=user.role==="student";

  // Build the list of students this viewer can see
  const visibleStudents=React.useMemo(()=>{
    if(isGuide||isStudent){
      // Include self if viewer is a student
      const list=[...allStudents];
      if(isStudent&&!list.find(s=>s.email===user.email))list.unshift(user);
      return list;
    }
    if(isParent)return allStudents.filter(s=>(user.children||[]).includes(s.email));
    return[];
  },[allStudents,user,isGuide,isParent,isStudent]);

  useEffect(()=>{
    (async()=>{
      const map={};
      await Promise.all(visibleStudents.map(async s=>{const k=await getKairos(s.email);map[s.email]=k.points;}));
      setPointsMap(map);setLoading(false);
    })();
  },[visibleStudents.map(s=>s.email).join(",")]);

  async function adjust(email,delta){
    if(adjusting)return;
    const cur=pointsMap[email]??KAIROS_DEFAULT;
    const nv=Math.min(KAIROS_MAX,Math.max(0,cur+delta));
    if(nv===cur)return;
    setAdjusting(email);
    await onAdjust(email,nv);
    setPointsMap(prev=>({...prev,[email]:nv}));
    setAdjusting(null);
  }

  const barColor=p=>p>=KAIROS_GAME_MIN?"#4ade80":p>=3?"#e8b84b":"#fc8181";

  return<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.6)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:300,padding:20}} onClick={onClose}>
    <div style={{background:"#fff",borderRadius:22,width:"100%",maxWidth:480,maxHeight:"82vh",display:"flex",flexDirection:"column",boxShadow:"0 24px 60px rgba(0,0,0,0.35)"}} onClick={e=>e.stopPropagation()}>

        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <div style={{width:40,height:40,borderRadius:12,background:"linear-gradient(135deg,#1a1a2e,#302b63)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20}}>❤️</div>
            <div>
              <div style={{fontSize:17,fontWeight:800,color:"#1a1a2e"}}>Kairos Points</div>
              <div style={{fontSize:11,color:"#aaa"}}>Resets to {KAIROS_DEFAULT} every Monday · Max {KAIROS_MAX}</div>
            </div>
          </div>
          <button onClick={onClose} style={{background:"none",border:"none",fontSize:20,cursor:"pointer",color:"#aaa",lineHeight:1}}>×</button>
        </div>
      </div>
      <div style={{overflowY:"auto",padding:"10px 16px 16px",flex:1}}>
        {loading&&<div style={{textAlign:"center",padding:"30px 0",color:"#bbb",fontSize:14}}>Loading...</div>}
        {!loading&&visibleStudents.length===0&&<div style={{textAlign:"center",padding:"30px 0",color:"#bbb",fontSize:13,fontStyle:"italic"}}>{isParent?"No children linked to your account yet.":"No students at your campus yet."}</div>}
        {!loading&&visibleStudents.map(s=>{
          const pts=pointsMap[s.email]??KAIROS_DEFAULT;
          const hasGame=pts>=KAIROS_GAME_MIN;
          const isMe=s.email===user.email;
          return<div key={s.email} style={{display:"flex",alignItems:"center",gap:12,padding:"11px 12px",borderRadius:12,marginBottom:6,background:isMe?"#f8f9ff":"#fafafa",border:`1px solid ${isMe?"#c3d2f0":"#f0f0f0"}`}}>
            <AvatarDisplay name={s.name} email={s.email} avatar={s.avatar} size={36}/>

// ── Voice Visualizer (real mic audio via Web Audio API) ───────────────────────
function VoiceVisualizer({stream,bars=14,width=80,height=32,color="#4ade80",idle=false}){
  const canvasRef=useRef();
  const rafRef=useRef();
  const ctxRef=useRef();
  const analyserRef=useRef();

  useEffect(()=>{
    const canvas=canvasRef.current;
    if(!canvas)return;
    if(!stream||idle){
      // draw flat idle bars
      cancelAnimationFrame(rafRef.current);
      const c=canvas.getContext("2d");
      c.clearRect(0,0,canvas.width,canvas.height);
      const bw=canvas.width/bars;
      for(let i=0;i<bars;i++){
        const h=3;
        c.fillStyle=color;c.globalAlpha=0.22;
        c.fillRect(i*bw+1,canvas.height/2-h/2,bw-2,h);
      }
      return;
    }
    let audioCtx;
    try{audioCtx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){return;}
    const source=audioCtx.createMediaStreamSource(stream);
    const analyser=audioCtx.createAnalyser();
    analyser.fftSize=128;
    source.connect(analyser);
    analyserRef.current=analyser;
    ctxRef.current=audioCtx;
    const data=new Uint8Array(analyser.frequencyBinCount);
    const draw=()=>{
      rafRef.current=requestAnimationFrame(draw);
      const c=canvas.getContext("2d");
      analyser.getByteFrequencyData(data);
      c.clearRect(0,0,canvas.width,canvas.height);
      const bw=canvas.width/bars;
      for(let i=0;i<bars;i++){
        const v=data[Math.floor(i*(data.length*0.7)/bars)]/255;
        const barH=Math.max(3,v*canvas.height*0.92);
        const y=canvas.height/2-barH/2;
        c.fillStyle=color;
        c.globalAlpha=0.28+v*0.72;
        c.fillRect(i*bw+1,y,bw-2,barH);
      }
    };
    draw();
    return()=>{
      cancelAnimationFrame(rafRef.current);
      try{audioCtx.close();}catch(e){}
    };
  },[stream,idle,bars,color,width,height]);

  return<canvas ref={canvasRef} width={width} height={height} style={{display:"block",borderRadius:4}}/>;
}

// Polls amplitude written by remote user, animates bars accordingly
function RemoteVoiceVisualizer({email,bars=14,width=80,height=32,color="#4ade80"}){
  const[amplitude,setAmplitude]=useState(0);
  const canvasRef=useRef();
  const rafRef=useRef();
  const phasesRef=useRef(Array.from({length:bars},(_,i)=>i*(Math.PI*2/bars)));
  const ampRef=useRef(0);

  useEffect(()=>{
    const t=setInterval(async()=>{
      try{
        const r=await load("speaking_"+safe(email));
        if(r){
          const d=JSON.parse(r.value);
          // fade out if stale (>800ms old)
          const fresh=Date.now()-d.ts<800;
          ampRef.current=fresh?(d.amplitude||0):0;
        }else{ampRef.current=0;}
      }catch(e){ampRef.current=0;}
    },200);
    return()=>clearInterval(t);
  },[email]);

  useEffect(()=>{
    const canvas=canvasRef.current;
    if(!canvas)return;
    const draw=()=>{
      rafRef.current=requestAnimationFrame(draw);
      const c=canvas.getContext("2d");
      const amp=ampRef.current;
      c.clearRect(0,0,canvas.width,canvas.height);
      const bw=canvas.width/bars;
      phasesRef.current=phasesRef.current.map((p,i)=>p+0.06+i*0.003);
      for(let i=0;i<bars;i++){
        const wave=(Math.sin(phasesRef.current[i])*0.5+0.5);
        const v=amp*wave;
        const barH=Math.max(3,v*canvas.height*0.92);
        const y=canvas.height/2-barH/2;
        c.fillStyle=color;
        c.globalAlpha=0.28+v*0.72;
        c.fillRect(i*bw+1,y,bw-2,barH);
      }
    };
    draw();
    return()=>cancelAnimationFrame(rafRef.current);
  },[bars,color]);

  return<canvas ref={canvasRef} width={width} height={height} style={{display:"block",borderRadius:4}}/>;
}

function LoginScreen({form,fv,onLogin,onSignup,onForgotPassword,err,loading}){
  const[fpStep,setFpStep]=useState(null);// null | "email" | "newpass"
  const[fpEmail,setFpEmail]=useState("");
  const[fpPass,setFpPass]=useState("");
  const[fpPass2,setFpPass2]=useState("");
  const[fpErr,setFpErr]=useState("");
  const[fpLoading,setFpLoading]=useState(false);
  const[fpDone,setFpDone]=useState(false);

  async function handleFpNext(){
    setFpErr("");
    if(!fpEmail.trim()){setFpErr("Please enter your email.");return;}
    setFpLoading(true);
    const exists=await load("auth_"+safe(fpEmail.trim().toLowerCase()));
    setFpLoading(false);
    if(!exists){setFpErr("No account found with that email.");return;}
    setFpStep("newpass");
  }

  async function handleChangePassword(){
    setFpErr("");
    if(!fpPass.trim()){setFpErr("Please enter a new password.");return;}
    if(fpPass!==fpPass2){setFpErr("Passwords do not match.");return;}
    if(fpPass.length<6){setFpErr("Password must be at least 6 characters.");return;}
    setFpLoading(true);
    await onForgotPassword(fpEmail.trim().toLowerCase(),fpPass);
    setFpLoading(false);
    setFpDone(true);
  }

  function resetFp(){setFpStep(null);setFpEmail("");setFpPass("");setFpPass2("");setFpErr("");setFpDone(false);}

  if(fpStep==="email"){
    return<AuthWrap>
      <Logo/>
      <h2 style={{fontSize:22,fontWeight:800,color:"#1a1a2e",margin:"22px 0 4px"}}>Forgot Password</h2>

      <Field label="School Email" value={fpEmail} onChange={setFpEmail} placeholder="you@alpha.edu"/>
      <ErrBox msg={fpErr}/>
      <PrimaryBtn onClick={handleFpNext} loading={fpLoading}>Continue</PrimaryBtn>
      <div style={{textAlign:"center",fontSize:13,color:"#888"}}><span onClick={resetFp} style={{color:"#e8b84b",fontWeight:700,cursor:"pointer"}}>← Back to Sign In</span></div>
    </AuthWrap>;
  }

  if(fpStep==="newpass"){
    return<AuthWrap>
      <Logo/>
      <h2 style={{fontSize:22,fontWeight:800,color:"#1a1a2e",margin:"22px 0 4px"}}>{fpDone?"Password Changed!":"Set New Password"}</h2>
      {fpDone
        ?<><p style={{fontSize:13,color:"#4ade80",marginBottom:24,fontWeight:600}}>✅ Your password has been updated. You can now sign in with your new password.</p>
          <PrimaryBtn onClick={resetFp}>Back to Sign In</PrimaryBtn></>
        :<><p style={{fontSize:13,color:"#888",marginBottom:24}}>Create a new password for <strong>{fpEmail}</strong>.</p>
          <Field label="New Password" type="password" value={fpPass} onChange={setFpPass} placeholder="New password"/>
          <Field label="Confirm New Password" type="password" value={fpPass2} onChange={setFpPass2} placeholder="Repeat new password"/>
          <ErrBox msg={fpErr}/>
          <PrimaryBtn onClick={handleChangePassword} loading={fpLoading}>Change Password</PrimaryBtn>
          <div style={{textAlign:"center",fontSize:13,color:"#888"}}><span onClick={resetFp} style={{color:"#e8b84b",fontWeight:700,cursor:"pointer"}}>← Back to Sign In</span></div>
        </>
      }
    </AuthWrap>;
  }

  return<AuthWrap>
    <Logo/>
    <h2 style={{fontSize:22,fontWeight:800,color:"#1a1a2e",margin:"22px 0 4px"}}>Welcome back</h2>
    <p style={{fontSize:13,color:"#888",marginBottom:24}}>Sign in to connect with your Alpha community</p>
    <Field label="School Email" value={form.email} onChange={v=>fv("email",v)} placeholder="you@alpha.edu"/>
    <Field label="Password" type="password" value={form.password} onChange={v=>fv("password",v)} placeholder="••••••••"/>
    <div style={{textAlign:"right",marginTop:-8,marginBottom:12}}>
      <span onClick={()=>setFpStep("email")} style={{fontSize:12,color:"#e8b84b",fontWeight:600,cursor:"pointer"}}>Forgot password?</span>
    </div>
    <ErrBox msg={err}/>
    <PrimaryBtn onClick={onLogin} loading={loading}>Sign In</PrimaryBtn>
    <div style={{textAlign:"center",fontSize:13,color:"#888"}}>New to Alpha?{" "}<span onClick={onSignup} style={{color:"#e8b84b",fontWeight:700,cursor:"pointer"}}>Create account</span></div>
  </AuthWrap>;
}

function TimeoutBar({until}){
  const[rem,setRem]=useState(Math.max(0,until-Date.now()));
  useEffect(()=>{if(until<=Date.now()){setRem(0);return;}const t=setInterval(()=>{const r=Math.max(0,until-Date.now());setRem(r);if(r===0)clearInterval(t);},1000);return()=>clearInterval(t);},[until]);
  if(rem<=0)return null;
  return<div style={{background:"#fff5f5",border:"1px solid #feb2b2",borderRadius:10,padding:"10px 16px",marginBottom:8,display:"flex",alignItems:"center",gap:8,fontSize:13,fontWeight:600,color:"#c53030"}}>You are timed out. You may send messages again in <strong>{fmtCountdown(rem)}</strong>.</div>;
}

function CooldownBar({until}){
  const[rem,setRem]=useState(Math.max(0,until-Date.now()));
  useEffect(()=>{if(until<=Date.now()){setRem(0);return;}const t=setInterval(()=>{const r=Math.max(0,until-Date.now());setRem(r);if(r===0)clearInterval(t);},100);return()=>clearInterval(t);},[until]);
  if(rem<=0)return null;
  const pct=Math.round((rem/5000)*100);
  return<div style={{background:"#f0f4ff",border:"1px solid #c3d2f0",borderRadius:10,padding:"8px 14px",marginBottom:8,display:"flex",alignItems:"center",gap:10,fontSize:12,fontWeight:600,color:"#4a6ec5"}}>
    <span>⏳ Cooldown:</span>
    <div style={{flex:1,background:"#dce8ff",borderRadius:20,height:6,overflow:"hidden"}}>
      <div style={{width:`${pct}%`,height:"100%",background:"#4a6ec5",borderRadius:20,transition:"width 0.1s linear"}}/>
    </div>
    <span style={{minWidth:28,textAlign:"right"}}>{(rem/1000).toFixed(1)}s</span>
  </div>;
}

function SuccessMsg({children}){return<div style={{textAlign:"center",padding:"22px 16px",color:"#276749",fontWeight:700,fontSize:15,background:"#f0fff4",borderRadius:12,border:"1px solid #9ae6b4"}}>✅ {children}</div>;}

function Captcha1({stepFails,onPass,onFail,completed}){
  const canvasRef=useRef();
  const[answer,setAnswer]=useState("");
  const[target,setTarget]=useState("");
  const CHARS="ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
  function gen(){return Array.from({length:5},()=>CHARS[Math.floor(Math.random()*CHARS.length)]).join("");}
  function draw(text,canvas){
    const ctx=canvas.getContext("2d"),w=canvas.width,h=canvas.height;
    ctx.clearRect(0,0,w,h);ctx.fillStyle="#eef1ff";ctx.fillRect(0,0,w,h);
    for(let i=0;i<10;i++){ctx.beginPath();ctx.strokeStyle=`hsl(${Math.random()*360},55%,72%)`;ctx.lineWidth=1.5;ctx.moveTo(Math.random()*w,Math.random()*h);ctx.bezierCurveTo(Math.random()*w,Math.random()*h,Math.random()*w,Math.random()*h,Math.random()*w,Math.random()*h);ctx.stroke();}
    for(let i=0;i<55;i++){ctx.fillStyle=`rgba(${Math.random()*180|0},${Math.random()*180|0},${Math.random()*180|0},0.3)`;ctx.beginPath();ctx.arc(Math.random()*w,Math.random()*h,Math.random()*2,0,Math.PI*2);ctx.fill();}
    const cols=["#1a1a2e","#302b63","#b87d1a","#3a5ec4","#1a6040"];
    const sp=w/(text.length+1);
    text.split("").forEach((c,i)=>{ctx.save();ctx.font=`bold ${28+Math.random()*9|0}px Arial`;ctx.fillStyle=cols[i%cols.length];const x=sp*(i+1)+(Math.random()-.5)*9,y=h/2+(Math.random()-.5)*15;ctx.translate(x,y);ctx.rotate((Math.random()-.5)*.5);ctx.fillText(c,0,0);ctx.restore();});
  }
  useEffect(()=>{const t=gen();setTarget(t);setAnswer("");setTimeout(()=>{if(canvasRef.current)draw(t,canvasRef.current);},30);},[stepFails]);
  function check(){if(answer.toUpperCase()===target)onPass();else onFail();}
  if(completed)return<SuccessMsg>Letters verified! Nice eye. 👁️</SuccessMsg>;
  return<div>
    <h3 style={{margin:"0 0 6px",fontSize:16,fontWeight:700,color:"#1a1a2e"}}>Type the characters you see</h3>
    <p style={{margin:"0 0 14px",fontSize:13,color:"#888"}}>Identify the 5 distorted characters in the image below.</p>
    <canvas ref={canvasRef} width={320} height={84} style={{display:"block",margin:"0 auto 14px",borderRadius:10,border:"2px solid #e8e8e8",maxWidth:"100%"}}/>
    <input value={answer} onChange={e=>setAnswer(e.target.value.toUpperCase())} onKeyDown={e=>e.key==="Enter"&&check()} placeholder="Enter characters..." maxLength={5} style={{width:"100%",padding:"11px 16px",border:"2px solid #e8e8e8",borderRadius:10,fontSize:20,letterSpacing:8,textAlign:"center",outline:"none",marginBottom:10,fontWeight:700,background:"#fafafa",boxSizing:"border-box"}}/>
    <button onClick={check} style={{width:"100%",padding:"11px",background:"linear-gradient(135deg,#1a1a2e,#302b63)",color:"#e8b84b",border:"none",borderRadius:10,fontSize:14,fontWeight:700,cursor:"pointer"}}>Check</button>
  </div>;
}

function Captcha2({stepFails,onPass,onFail,completed}){
  const G=4,C=4;
  const[phase,setPhase]=useState("show");
  const[pattern,setPattern]=useState([]);
  const[sel,setSel]=useState([]);
  const timerRef=useRef();
  function genPat(){const p=[];while(p.length<C){const c=Math.floor(Math.random()*G*G);if(!p.includes(c))p.push(c);}return p;}
  useEffect(()=>{clearTimeout(timerRef.current);const p=genPat();setPattern(p);setPhase("show");setSel([]);timerRef.current=setTimeout(()=>setPhase("input"),2800);return()=>clearTimeout(timerRef.current);},[stepFails]);
  function toggle(i){if(phase!=="input")return;setSel(prev=>prev.includes(i)?prev.filter(x=>x!==i):[...prev,i]);}
  function check(){const ok=pattern.every(c=>sel.includes(c))&&sel.every(c=>pattern.includes(c));if(ok)onPass();else onFail();}
  if(completed)return<SuccessMsg>Pattern memorized! Great memory. 🧠</SuccessMsg>;
  return<div>
    <h3 style={{margin:"0 0 6px",fontSize:16,fontWeight:700,color:"#1a1a2e"}}>Memorize the pattern</h3>
    <p style={{margin:"0 0 14px",fontSize:13,color:"#888"}}>{phase==="show"?"Remember the highlighted cells — they disappear soon!":"Now click the cells you saw to recreate the pattern."}</p>
    <div style={{display:"grid",gridTemplateColumns:`repeat(${G},1fr)`,gap:7,maxWidth:230,margin:"0 auto 16px"}}>
      {Array.from({length:G*G},(_,i)=>{const inP=pattern.includes(i),inS=sel.includes(i);return<div key={i} onClick={()=>toggle(i)} style={{height:48,borderRadius:8,cursor:phase==="input"?"pointer":"default",background:phase==="show"?(inP?"#e8b84b":"#f0f0f0"):(inS?"#e8b84b":"#f0f0f0"),border:`2px solid ${phase==="show"?(inP?"#c9972a":"#dedede"):(inS?"#c9972a":"#dedede")}`,transition:"all 0.2s",boxShadow:inP&&phase==="show"?"0 2px 8px rgba(232,184,75,0.4)":"none"}}/>;})}</div>
    {phase==="input"?<button onClick={check} style={{width:"100%",padding:"11px",background:"linear-gradient(135deg,#1a1a2e,#302b63)",color:"#e8b84b",border:"none",borderRadius:10,fontSize:14,fontWeight:700,cursor:"pointer"}}>Check Pattern</button>:<div style={{textAlign:"center",fontSize:13,color:"#aaa",fontStyle:"italic",padding:"6px 0"}}>⏳ Memorize carefully...</div>}
  </div>;
}

function Captcha3({stepFails,onPass,onFail,completed}){
  const GS=9;
  const DIST=["😀","😂","😍","🤔","😎","🥳","😴","🤯","😱","🤗","😈","👻","🤖","💀","🎉","🌟","🔥","💯","✅","❌","🍕","🍔","🎮","🏆","🌈","⭐","🎵","💡","🚀","✈️","🌸","🦊","🐱","🐶","🐷","🐸","🌺","🍎","💎","🌙","☀️","🌊","🏔️","🎸","🎨","📚","💻","🎯","🦋","🐝","🦎","🐢","🦁","🐯","🐻","🐼","🦝","🐺","🦌","🐗","🦬","🐃","🦑","🦞","🦀","🦪","🌵","🌴","🍄","🍁","🌻","🎃","🧸","🪆"];
  const[birdPos,setBirdPos]=useState(-1);
  const[emojis,setEmojis]=useState([]);
  useEffect(()=>{const total=GS*GS;const pos=Math.floor(Math.random()*total);setBirdPos(pos);const arr=Array.from({length:total},(_,i)=>{if(i===pos)return"🐦";return DIST[Math.floor(Math.random()*DIST.length)];});setEmojis(arr);},[stepFails]);
  function handleClick(i){if(i===birdPos)onPass();else onFail();}
  if(completed)return<SuccessMsg>You found Alpha! 🐦</SuccessMsg>;
  return<div>
    <h3 style={{margin:"0 0 4px",fontSize:16,fontWeight:700,color:"#1a1a2e"}}>🐦 Where's Alpha?</h3>
    <p style={{margin:"0 0 10px",fontSize:13,color:"#888"}}>Find the <strong>bird emoji (🐦)</strong> hiding in the grid below. Good luck!</p>
    <div style={{display:"grid",gridTemplateColumns:`repeat(${GS},1fr)`,gap:1,margin:"0 auto",border:"2px solid #e8e8e8",borderRadius:10,overflow:"hidden",background:"#f8f9fa"}}>
      {emojis.map((e,i)=><div key={i} onClick={()=>handleClick(i)} title="Click me!" style={{fontSize:17,textAlign:"center",cursor:"pointer",padding:"3px 1px",lineHeight:1.35,transition:"background 0.08s"}} onMouseEnter={ev=>ev.currentTarget.style.background="#dbeafe"} onMouseLeave={ev=>ev.currentTarget.style.background="transparent"}>{e}</div>)}
    </div>
  </div>;
}

function Captcha4({stepFails,onPass,onFail,completed}){
  const BIRDS=["🐦","🦅","🦆","🦉","🦚","🦜","🐧","🦩","🕊️","🦢","🐓","🪶"];
  const NONB=["🐶","🐱","🐭","🦊","🐻","🐼","🐨","🐯","🦁","🐮","🐷","🐸","🐵","🦋","🐝","🐛","🦎","🐢","🐍","🦕","🦈","🐬","🐋","🐘","🦏","🦛","🐃","🦒","🦘","🦌","🦔","🐿️","🦝","🦨","🦦","🦥","🐇","🦑","🦞","🦀"];
  const[grid,setGrid]=useState([]);
  const[birdIdxs,setBirdIdxs]=useState([]);
  const[sel,setSel]=useState([]);
  useEffect(()=>{const nb=3+Math.floor(Math.random()*3);const bs=[...BIRDS].sort(()=>Math.random()-.5).slice(0,nb);const ns=[...NONB].sort(()=>Math.random()-.5).slice(0,12-nb);const combined=[...bs.map(e=>({e,bird:true})),...ns.map(e=>({e,bird:false}))].sort(()=>Math.random()-.5);setGrid(combined);setBirdIdxs(combined.map((x,i)=>x.bird?i:-1).filter(i=>i!==-1));setSel([]);},[stepFails]);
  function toggle(i){setSel(prev=>prev.includes(i)?prev.filter(x=>x!==i):[...prev,i]);}
  function check(){const ok=birdIdxs.every(i=>sel.includes(i))&&sel.every(i=>birdIdxs.includes(i));if(ok)onPass();else onFail();}
  if(completed)return<SuccessMsg>All birds selected! 🦅</SuccessMsg>;
  return<div>
    <h3 style={{margin:"0 0 4px",fontSize:16,fontWeight:700,color:"#1a1a2e"}}>Select all bird emojis</h3>
    <p style={{margin:"0 0 12px",fontSize:13,color:"#888"}}>Click every emoji that is a bird. Click again to deselect.</p>
    <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8,marginBottom:14}}>
      {grid.map((item,i)=><div key={i} onClick={()=>toggle(i)} style={{fontSize:26,textAlign:"center",cursor:"pointer",padding:"10px 4px",borderRadius:10,border:`2px solid ${sel.includes(i)?"#e8b84b":"#e8e8e8"}`,background:sel.includes(i)?"#fffdf5":"#fafafa",transition:"all 0.15s",boxShadow:sel.includes(i)?"0 2px 8px rgba(232,184,75,0.3)":"none"}}>{item.e}</div>)}
    </div>
    <button onClick={check} style={{width:"100%",padding:"11px",background:"linear-gradient(135deg,#1a1a2e,#302b63)",color:"#e8b84b",border:"none",borderRadius:10,fontSize:14,fontWeight:700,cursor:"pointer"}}>Check Selection</button>
  </div>;
}

function Captcha5({stepFails,onPass,onFail,completed}){
  const VALID=["love school","learn 2x in 2 hours","learn life skills"];
  const[ans,setAns]=useState("");
  const[checked,setChecked]=useState(false);
  useEffect(()=>{setAns("");setChecked(false);},[stepFails]);
  function check(){if(!checked||!ans.trim())return;if(VALID.includes(ans.trim().toLowerCase()))onPass();else onFail();}
  if(completed)return<SuccessMsg>Commitment confirmed! Welcome to Alpha. 🎓</SuccessMsg>;
  return<div>
    <h3 style={{margin:"0 0 4px",fontSize:16,fontWeight:700,color:"#1a1a2e"}}>Final Verification</h3>
    <div style={{background:"#f8f9fa",border:"1px solid #e8e8e8",borderRadius:12,padding:"16px",marginBottom:14}}>
      <p style={{margin:"0 0 12px",fontSize:14,color:"#1a1a2e",fontWeight:600,lineHeight:1.5}}>What is one of the 3 commitments at Alpha?</p>
      <input value={ans} onChange={e=>setAns(e.target.value)} onKeyDown={e=>e.key==="Enter"&&checked&&check()} placeholder="Type your answer..." style={{width:"100%",padding:"11px 16px",border:"2px solid #e8e8e8",borderRadius:10,fontSize:14,outline:"none",marginBottom:8,background:"#fff",boxSizing:"border-box"}}/>

      <div onClick={()=>setChecked(v=>!v)} style={{display:"flex",alignItems:"center",gap:10,cursor:"pointer",userSelect:"none",padding:"10px 12px",borderRadius:8,border:"1px solid #e0e0e0",background:"#fff",transition:"border 0.15s"}}>
        <div style={{width:20,height:20,border:`2px solid ${checked?"#1a1a2e":"#ccc"}`,borderRadius:3,background:checked?"#1a1a2e":"#fff",display:"flex",alignItems:"center",justifyContent:"center",transition:"all 0.15s",flexShrink:0}}>
          {checked&&<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="3"><polyline points="20 6 9 17 4 12"/></svg>}
        </div>
        <span style={{fontSize:13,color:"#444",flex:1,fontWeight:500}}>I'm not a robot</span>
        <span style={{fontSize:24}}>🤖</span>
      </div>
    </div>
    <button onClick={check} disabled={!checked||!ans.trim()} style={{width:"100%",padding:"11px",background:"linear-gradient(135deg,#1a1a2e,#302b63)",color:"#e8b84b",border:"none",borderRadius:10,fontSize:14,fontWeight:700,cursor:!checked||!ans.trim()?"not-allowed":"pointer",opacity:!checked||!ans.trim()?0.5:1}}>Submit Answer</button>
  </div>;
}

function CaptchaFlow({onComplete}){
  const[step,setStep]=useState(0);
  const[stepFails,setStepFails]=useState(0);
  const[completed,setCompleted]=useState([false,false,false,false,false]);
  const attemptsLeft=3-stepFails;
  const TITLES=["CAPTCHA 1 of 5 — Letter Recognition","CAPTCHA 2 of 5 — Pattern Memory","CAPTCHA 3 of 5 — Where's Alpha?","CAPTCHA 4 of 5 — Bird Identification","CAPTCHA 5 of 5 — Alpha Commitment"];
  function handlePass(){setCompleted(prev=>{const n=[...prev];n[step]=true;return n;});setStepFails(0);}
  function handleFail(){
    const nf=stepFails+1;
    if(nf>=3&&step>0){
      setCompleted(prev=>{const n=[...prev];n[step]=false;n[step-1]=false;return n;});
      setStep(s=>s-1);setStepFails(0);
    }else{
      setStepFails(nf);
    }
  }
  function proceed(){if(step<4){setStep(s=>s+1);setStepFails(0);}}
  const done=completed[step];
  return<div style={{position:"fixed",inset:0,background:"rgba(8,8,24,0.93)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:9999,padding:"16px"}}>
    <div style={{background:"#fff",borderRadius:22,padding:"28px 26px",width:"100%",maxWidth:490,boxShadow:"0 32px 100px rgba(0,0,0,0.7)",maxHeight:"92vh",overflowY:"auto"}}>
      <div style={{textAlign:"center",marginBottom:22}}>
        <div style={{display:"inline-flex",alignItems:"center",gap:8,background:"linear-gradient(135deg,#1a1a2e,#302b63)",padding:"8px 20px",borderRadius:30,marginBottom:14}}>
          <span style={{fontSize:15}}>🔒</span>
          <span style={{color:"#e8b84b",fontFamily:"'Neuropolitical',sans-serif",fontSize:13,fontWeight:800,letterSpacing:1.5}}>ALPHA VERIFY</span>
        </div>
        <div style={{fontSize:11,fontWeight:700,color:"#999",textTransform:"uppercase",letterSpacing:0.8,marginBottom:12}}>{TITLES[step]}</div>
        <div style={{display:"flex",gap:5,justifyContent:"center",marginBottom:stepFails>0&&!done?8:0}}>
          {[0,1,2,3,4].map(i=><div key={i} style={{width:38,height:5,borderRadius:3,background:i<step?"#4ade80":i===step?"#e8b84b":"#e0e0e0",transition:"background 0.35s"}}/>)}
        </div>
        {stepFails>0&&!done&&<div style={{fontSize:12,color:"#e53e3e",fontWeight:600,marginTop:8}}>⚠️ {attemptsLeft} attempt{attemptsLeft!==1?"s":""} left — 3 failures sends you back!</div>}
      </div>
      {step===0&&<Captcha1 stepFails={stepFails} onPass={handlePass} onFail={handleFail} completed={done}/>}
      {step===1&&<Captcha2 stepFails={stepFails} onPass={handlePass} onFail={handleFail} completed={done}/>}
      {step===2&&<Captcha3 stepFails={stepFails} onPass={handlePass} onFail={handleFail} completed={done}/>}
      {step===3&&<Captcha4 stepFails={stepFails} onPass={handlePass} onFail={handleFail} completed={done}/>}
      {step===4&&<Captcha5 stepFails={stepFails} onPass={handlePass} onFail={handleFail} completed={done}/>}
      {done&&<div style={{marginTop:20,display:"flex",justifyContent:"flex-end"}}>
        {step<4
          ?<button onClick={proceed} style={{padding:"12px 30px",background:"linear-gradient(135deg,#1a1a2e,#302b63)",color:"#e8b84b",border:"none",borderRadius:12,fontSize:15,fontWeight:800,cursor:"pointer",letterSpacing:0.3,boxShadow:"0 4px 16px rgba(26,26,46,0.3)"}}>Proceed →</button>
          :<button onClick={onComplete} style={{padding:"12px 30px",background:"linear-gradient(135deg,#1a6040,#4ade80)",color:"#fff",border:"none",borderRadius:12,fontSize:15,fontWeight:800,cursor:"pointer",letterSpacing:0.3,boxShadow:"0 4px 16px rgba(74,222,128,0.35)"}}>☑️ Verify</button>
        }
      </div>}
    </div>

// ── Main App ──────────────────────────────────────────────────────────────────
function App(){
  const[page,setPage]=useState("login");const[user,setUser]=useState(null);const[pendingUser,setPendingUser]=useState(null);const[err,setErr]=useState("");const[loading,setLoading]=useState(false);
  const[form,setForm]=useState({name:"",email:"",password:"",location:""});
  const[room,setRoom]=useState(null);const[msgs,setMsgs]=useState([]);const[roomUsers,setRoomUsers]=useState([]);const[channels,setChannels]=useState([]);const[msgInput,setMsgInput]=useState("");const[timeoutUntil,setTimeoutUntil]=useState(0);const[cooldownUntil,setCooldownUntil]=useState(0);const[notifs,setNotifs]=useState([]);const[announcement,setAnnouncement]=useState(null);const[dismissedWarnings,setDismissedWarnings]=useState(new Set());const[bannedWords,setBannedWords]=useState([...DEFAULT_BANNED_WORDS]);
  const[activeCalls,setActiveCalls]=useState([]);const[myCallId,setMyCallId]=useState(null);
  const bottomRef=useRef();const pollMsgRef=useRef();const pollUsrRef=useRef();const pollChRef=useRef();const pollNotifRef=useRef();const pollAnnRef=useRef();const pollCallRef=useRef();const pendingRef=useRef([]);const roomRef=useRef(null);
  const fv=(k,v)=>setForm(f=>({...f,[k]:v}));

  async function doSignup(){
    setErr("");setLoading(true);
    try{let{name,email,password,location}=form;email=email.trim().toLowerCase();if(!name||!email||!password||!location){setErr("All fields are required.");setLoading(false);return;}
    if(await load("u_"+safe(email))){setErr("This email is already registered.");setLoading(false);return;}
    await save("auth_"+safe(email),JSON.stringify({hash:await sha256(password)}));
    const emailsR=await load("all_emails");const emails=emailsR?JSON.parse(emailsR.value):[];
    if(!emails.includes(email)){emails.push(email);await save("all_emails",JSON.stringify(emails));}
    const ud={name,email,location,role:null,timeoutUntil:0,lvl1SwearCount:0};
    await save("u_"+safe(email),JSON.stringify(ud));setUser(ud);setLoading(false);setPage("roleSelect");
    }catch(e){console.error("Signup error:",e);setErr("Error: "+(e?.message||"Permission denied. Make sure your Firebase Realtime Database rules allow read/write."));setLoading(false);}
  }

  async function doForgotPassword(email,newPassword){
    const hash=await sha256(newPassword);
    await save("auth_"+safe(email),JSON.stringify({hash}));
  }

  async function doLogin(){
    setErr("");setLoading(true);
    try{let{email,password}=form;email=email.trim().toLowerCase();if(!email||!password){setErr("Email and password required.");setLoading(false);return;}
    const authR=await load("auth_"+safe(email));if(!authR){setErr("No account found with this email. Please check your email or create an account.");setLoading(false);return;}
    const auth=JSON.parse(authR.value);if(await sha256(password)!==auth.hash){setErr("Incorrect password.");setLoading(false);return;}
    const udR=await load("u_"+safe(email));if(!udR){setErr("Account data not found. Please try again.");setLoading(false);return;}
    const ud=JSON.parse(udR.value);setUser(ud);setTimeoutUntil(ud.timeoutUntil||0);setLoading(false);
    if(!ud.role)setPage("roleSelect");else if(ud.role==="parent"&&!ud.children)setPage("childrenSelect");else enterChat(ud,true);
    }catch(e){console.error("Login error:",e);setErr("Error: "+(e?.message||"Could not connect to database. Check your Firebase rules allow read/write."));setLoading(false);}
  }

  async function chooseRole(role){const ud={...user,role};await save("u_"+safe(user.email),JSON.stringify(ud));setUser(ud);if(role==="student")setPage("gradeSelect");else if(role==="parent")setPage("childrenSelect");else enterChat(ud);}
  async function chooseGrade(grade){const ud={...user,grade};await save("u_"+safe(user.email),JSON.stringify(ud));setUser(ud);enterChat(ud);}
  async function chooseChildren(childEmails){const ud={...user,children:childEmails};await save("u_"+safe(user.email),JSON.stringify(ud));setUser(ud);enterChat(ud);}

  async function enterChat(u,fromLogin=false){
    if(fromLogin&&u.skipLoginCaptcha){await completeCaptcha(u);}
    else{setPendingUser(u);setPage("captcha");}
  }
  async function completeCaptcha(u){
    const r={type:"loc",id:"loc_"+safe(u.location),name:`${u.location} — General`};roomRef.current=r;setRoom(r);
    await loadPeers(u);await loadChannels(u.location);setAnnouncement(await getAnnouncement(u.location));
    const dismissedR=await load("dismissed_"+safe(u.email));const dismissed=dismissedR?JSON.parse(dismissedR.value):[];setDismissedWarnings(new Set(dismissed));
    setBannedWords(await loadBannedWords(u.location));
    setPage("chat");
  }

  async function loadPeers(u){
    const r=await load("all_emails");const emails=r?JSON.parse(r.value):[];const list=[];
    for(const e of emails){if(e===u.email)continue;const ur=await load("u_"+safe(e));if(ur){const ud=JSON.parse(ur.value);if(ud&&ud.location===u.location&&ud.role)list.push(ud);}}
    setRoomUsers(list);
  }
  async function loadChannels(loc){const r=await load("chs_"+safe(loc));setChannels(r?JSON.parse(r.value):[]);}

  async function createChannel(name,minGrade){
    const loc=user.location;const chsR=await load("chs_"+safe(loc));const chs=chsR?JSON.parse(chsR.value):[];
    const ch={id:"ch"+Date.now(),name,location:loc,minGrade};chs.push(ch);await save("chs_"+safe(loc),JSON.stringify(chs));setChannels([...chs]);
    const r={type:"ch",id:"ch_"+ch.id,name:ch.name,minGrade};roomRef.current=r;setRoom(r);
  }
  async function deleteChannel(ch){
    const loc=user.location;const chsR=await load("chs_"+safe(loc));const chs=chsR?JSON.parse(chsR.value):[];const updated=chs.filter(c=>c.id!==ch.id);
    await save("chs_"+safe(loc),JSON.stringify(updated));setChannels(updated);
    if(room?.id==="ch_"+ch.id){const r={type:"loc",id:"loc_"+safe(loc),name:`${loc} — General`};roomRef.current=r;setRoom(r);}
  }

  useEffect(()=>{
    if(page!=="chat"||!room)return;clearInterval(pollMsgRef.current);pendingRef.current=[];
    const roomId=room.id;
    const poll=async()=>{const polled=await getMsgs(roomId);pendingRef.current=pendingRef.current.filter(p=>!polled.find(m=>m.id===p.id));setMsgs([...polled,...pendingRef.current].sort((a,b)=>a.ts-b.ts));};
    poll();pollMsgRef.current=setInterval(poll,2000);return()=>clearInterval(pollMsgRef.current);
  },[page,room?.id]);

  useEffect(()=>{
    if(page!=="chat"||!user)return;
    pollUsrRef.current=setInterval(()=>loadPeers(user),8000);pollChRef.current=setInterval(()=>loadChannels(user.location),5000);
    pollAnnRef.current=setInterval(async()=>{setAnnouncement(await getAnnouncement(user.location));setBannedWords(await loadBannedWords(user.location));},5000);
    return()=>{clearInterval(pollUsrRef.current);clearInterval(pollChRef.current);clearInterval(pollAnnRef.current);};
  },[page,user?.email]);

  useEffect(()=>{if(page!=="chat"||!user)return;const poll=async()=>setNotifs(await loadNotifs(user.email));poll();pollNotifRef.current=setInterval(poll,4000);return()=>clearInterval(pollNotifRef.current);},[page,user?.email]);
  useEffect(()=>{if(page!=="chat"||!user)return;const poll=async()=>{const calls=await loadCalls(user.location);setActiveCalls(calls);};poll();pollCallRef.current=setInterval(poll,3000);return()=>clearInterval(pollCallRef.current);},[page,user?.email]);
  useEffect(()=>{bottomRef.current?.scrollIntoView({behavior:"smooth"});},[msgs]);

  async function sendMsg(){
    if(!msgInput.trim()||!room)return;if(timeoutUntil&&timeoutUntil>Date.now())return;
    if(user.role==="student"&&cooldownUntil&&cooldownUntil>Date.now())return;
    if(user.role==="student"&&room?.type==="ch"&&room?.minGrade&&gradeRank(user.grade)<gradeRank(room.minGrade))return;
    const text=msgInput.trim();const roomId=room.id;const email=user.email;const name=user.name;const role=user.role;setMsgInput("");
    if(role==="student")setCooldownUntil(Date.now()+5000);
    if(role==="student"){const sw=checkSwear(text);if(sw){let timeoutMins=sw.minutes;let lvl1Count=user.lvl1SwearCount||0;if(sw.level===1){lvl1Count+=1;if(lvl1Count>=3){timeoutMins=5;lvl1Count=0;}}const sentinel={id:Date.now()+"_"+Math.random().toString(36).slice(2,7),from:email,name,role,ts:Date.now(),deleted:true,swearLevel:sw.level,swearLabel:sw.label,swearWord:sw.word,timeoutMins,text:""};pendingRef.current.push(sentinel);setMsgs(prev=>[...prev,sentinel]);await appendMsg(roomId,sentinel);const guides=await getGuidesAtCampus(user.location);const pun=timeoutMins>0?` They have been timed out for ${timeoutMins} minute${timeoutMins>1?"s":""}.`:"";await Promise.all(guides.map(g=>writeNotif(g.email,`⚠️ ${name} used a ${sw.label} swear word: "${sw.word}".${pun}`)));const swParents=await getParentsOfStudent(email,user.location);await Promise.all(swParents.map(p=>writeNotif(p.email,`⚠️ Your child ${name} used a ${sw.label} swear word: "${sw.word}".${pun}`)));const until=timeoutMins>0?Date.now()+timeoutMins*60*1000:(user.timeoutUntil||0);const ud={...user,lvl1SwearCount:lvl1Count,timeoutUntil:until};setUser(ud);await save("u_"+safe(email),JSON.stringify(ud));if(timeoutMins>0)setTimeoutUntil(until);return;}}
    const brainrotWord=role==="student"?checkBrainrot(text,bannedWords):null;
    const msg={id:Date.now()+"_"+Math.random().toString(36).slice(2,7),from:email,name,role,text,ts:Date.now(),flagged:false,brainrot:brainrotWord||null,likedBy:[],grade:user.grade||null,avatar:user.avatar||null};
    pendingRef.current.push(msg);setMsgs(prev=>[...prev,msg]);await appendMsg(roomId,msg);
    if(brainrotWord){const guides=await getGuidesAtCampus(user.location);await Promise.all(guides.map(g=>writeNotif(g.email,`⚠️ ${name} used a banned brainrot word: "${brainrotWord}".`)));const brParents=await getParentsOfStudent(email,user.location);await Promise.all(brParents.map(p=>writeNotif(p.email,`⚠️ Your child ${name} used a banned brainrot word: "${brainrotWord}".`)));}
  }

  async function handleLike(m){if(!room||m.deleted)return;const likedBy=m.likedBy||[];const newLikedBy=likedBy.includes(user.email)?likedBy.filter(e=>e!==user.email):[...likedBy,user.email];await updateMsg(room.id,m.id,{likedBy:newLikedBy});setMsgs(prev=>prev.map(x=>x.id===m.id?{...x,likedBy:newLikedBy}:x));}
  async function handleReport(m,reason,summary){const rpt={id:Date.now()+"_r",msgId:m.id,author:m.name,reporter:user.name,reason:reason.label,summary,ts:Date.now()};const key="rpts_"+safe(user.location);const rR=await load(key);const arr=rR?JSON.parse(rR.value):[];arr.unshift(rpt);await save(key,JSON.stringify(arr));const guides=await getGuidesAtCampus(user.location);await Promise.all(guides.map(g=>writeNotif(g.email,`🚩 ${user.name} reported a message by ${m.name} for ${reason.label}. Summary: "${summary.slice(0,80)}${summary.length>80?"...":""}"`)));const rptParents=await getParentsOfStudent(m.from,user.location);await Promise.all(rptParents.map(p=>writeNotif(p.email,`🚩 Your child ${m.name} was reported for ${reason.label}. Summary: "${summary.slice(0,80)}${summary.length>80?"...":""}"`)));}
  async function handleDeleteOwn(m){if(!room||m.from!==user.email)return;await deleteMsg(room.id,m.id);setMsgs(prev=>prev.filter(x=>x.id!==m.id));pendingRef.current=pendingRef.current.filter(x=>x.id!==m.id);}
  async function handleDeleteGuide(m){if(!room)return;await deleteMsg(room.id,m.id);setMsgs(prev=>prev.filter(x=>x.id!==m.id));}
  async function notifyUser(target){await writeNotif(target.email,`💬 ${user.name} would like to chat with you.`);}
  async function handleMarkRead(){await markAllRead(user.email);setNotifs(prev=>prev.map(n=>({...n,read:true})));}
  function openDM(target){const key=[user.email,target.email].sort().map(safe).join("_dm_");const r={type:"dm",id:"dm_"+key,name:target.name,targetEmail:target.email};roomRef.current=r;setRoom(r);}
  async function handleAdjustKairos(email,newPoints){await setKairos(email,newPoints);}
  async function handleBanWord(word){const updated=[...bannedWords,word];await saveBannedWords(user.location,updated);setBannedWords(updated);}
  async function handleUnbanWord(word){const updated=bannedWords.filter(w=>w.toLowerCase()!==word.toLowerCase());await saveBannedWords(user.location,updated);setBannedWords(updated);}
  async function handleAnnounce(text,topic){const data={text,topicLabel:topic.label,authorName:user.name,ts:Date.now()};await saveAnnouncement(user.location,data);setAnnouncement(data);}
  async function handleClearAnnouncement(){await clearAnnouncement(user.location);setAnnouncement(null);}
  async function saveSettings(name,location,grade,avatar,children,skipLoginCaptcha){const ud={...user,name,location,skipLoginCaptcha:!!skipLoginCaptcha};if(grade)ud.grade=grade;if(avatar)ud.avatar=avatar;if(user.role==="parent")ud.children=children||[];await save("u_"+safe(user.email),JSON.stringify(ud));setUser(ud);}
  async function deleteAccount(){const email=user.email;await save("u_"+safe(email),null);await save("auth_"+safe(email),null);const emailsR=await load("all_emails");const emails=emailsR?JSON.parse(emailsR.value):[];await save("all_emails",JSON.stringify(emails.filter(e=>e!==email)));signOut();}
  async function dismissWarning(id){const key="dismissed_"+safe(user.email);const existing=(await load(key))?JSON.parse((await load(key)).value):[];if(!existing.includes(id)){existing.push(id);await save(key,JSON.stringify(existing));}setDismissedWarnings(prev=>new Set([...prev,id]));}
  async function handleStartCall(callName){
    if(myCallId)return;
    const call=await startCall(user.location,callName,user);
    setMyCallId(call.id);
    const calls=await loadCalls(user.location);setActiveCalls(calls);
  }
  async function handleJoinCall(call){
    if(myCallId&&myCallId!==call.id){return;}
    if(myCallId===call.id)return;
    const updated=await joinCall(user.location,call.id,user);
    if(updated){setMyCallId(call.id);const calls=await loadCalls(user.location);setActiveCalls(calls);}
  }
  async function handleLeaveCall(){
    if(!myCallId)return;
    await leaveCall(user.location,myCallId,user.email);
    setMyCallId(null);
    const calls=await loadCalls(user.location);setActiveCalls(calls);
  }
  function signOut(){clearInterval(pollMsgRef.current);clearInterval(pollUsrRef.current);clearInterval(pollChRef.current);clearInterval(pollNotifRef.current);clearInterval(pollAnnRef.current);clearInterval(pollCallRef.current);pendingRef.current=[];roomRef.current=null;setUser(null);setRoom(null);setMsgs([]);setRoomUsers([]);setChannels([]);setTimeoutUntil(0);setNotifs([]);setAnnouncement(null);setDismissedWarnings(new Set());setActiveCalls([]);setMyCallId(null);setForm({name:"",email:"",password:"",location:""});setPage("login");}

  if(page==="login")return<LoginScreen form={form} fv={fv} onLogin={doLogin} onSignup={()=>{setErr("");setPage("signup");}} onForgotPassword={doForgotPassword} err={err} loading={loading}/>;
  if(page==="signup")return<SignupScreen form={form} fv={fv} onSubmit={doSignup} onBack={()=>{setErr("");setPage("login");}} err={err} loading={loading}/>;
  if(page==="roleSelect")return<RoleScreen name={user?.name} onSelect={chooseRole}/>;
  if(page==="gradeSelect")return<GradeScreen name={user?.name} onSelect={chooseGrade}/>;
  if(page==="childrenSelect")return<ChildrenScreen user={user} onProceed={chooseChildren}/>;
  if(page==="captcha")return<CaptchaFlow onComplete={()=>completeCaptcha(pendingUser)}/>;
  return<ChatScreen user={user} room={room} msgs={msgs} roomUsers={roomUsers} channels={channels} msgInput={msgInput} setMsgInput={setMsgInput} onSend={sendMsg} onDM={openDM} onLocRoom={()=>{const r={type:"loc",id:"loc_"+safe(user.location),name:`${user.location} — General`};roomRef.current=r;setRoom(r);}} onChannel={ch=>{const r={type:"ch",id:"ch_"+ch.id,name:ch.name,minGrade:ch.minGrade||null};roomRef.current=r;setRoom(r);}} onCreateChannel={createChannel} onDeleteChannel={deleteChannel} onDelete={handleDeleteGuide} bottomRef={bottomRef} onSignOut={signOut} isGuide={user?.role==="guide"} isParent={user?.role==="parent"} timeoutUntil={timeoutUntil} cooldownUntil={cooldownUntil} onSaveSettings={saveSettings} onDeleteAccount={deleteAccount} onNotifyUser={notifyUser} notifs={notifs} onMarkRead={handleMarkRead} onLike={handleLike} onReport={handleReport} onDeleteOwn={handleDeleteOwn} announcement={announcement} onAnnounce={handleAnnounce} onClearAnnouncement={handleClearAnnouncement} dismissedWarnings={dismissedWarnings} onDismissWarning={dismissWarning} bannedWords={bannedWords} onBanWord={handleBanWord} onUnbanWord={handleUnbanWord} onAdjustKairos={handleAdjustKairos} activeCalls={activeCalls} myCallId={myCallId} onStartCall={handleStartCall} onJoinCall={handleJoinCall} onLeaveCall={handleLeaveCall}/>;
}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
</html>
